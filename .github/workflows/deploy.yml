name: Deploy no VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REPOSITORY: ${{ github.repository }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
      FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
      TRAEFIK_ENTRYPOINTS: ${{ secrets.TRAEFIK_ENTRYPOINTS }}
      TRAEFIK_CERTRESOLVER: ${{ secrets.TRAEFIK_CERTRESOLVER }}
      TRAEFIK_ACME_EMAIL: ${{ secrets.TRAEFIK_ACME_EMAIL }}
      COOKIE_SECURE: ${{ secrets.COOKIE_SECURE }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 20m
          script_stop: true
          envs: REPOSITORY,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,JWT_SECRET,APP_DOMAIN,FRONTEND_PORT,TRAEFIK_ENTRYPOINTS,TRAEFIK_CERTRESOLVER,TRAEFIK_ACME_EMAIL,COOKIE_SECURE
          script: |
            set -eu

            export DEBIAN_FRONTEND=noninteractive

            if ! command -v git >/dev/null 2>&1; then
              apt-get update
              apt-get install -y git curl ca-certificates gnupg
            fi

            if ! command -v docker >/dev/null 2>&1; then
              apt-get update
              apt-get install -y ca-certificates curl gnupg lsb-release
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              . /etc/os-release
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu ${VERSION_CODENAME} stable" \
                > /etc/apt/sources.list.d/docker.list
              apt-get update
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              systemctl enable --now docker
            fi

            if [ ! -d /root/capstone/.git ]; then
              rm -rf /root/capstone
              git clone https://github.com/${REPOSITORY}.git /root/capstone
            fi

            cd /root/capstone
            git fetch origin main
            git checkout main
            git pull origin main

            FRONTEND_PORT_VALUE="${FRONTEND_PORT:-8080}"
            TRAEFIK_ENTRYPOINTS_VALUE="${TRAEFIK_ENTRYPOINTS:-websecure}"
            TRAEFIK_CERTRESOLVER_VALUE="${TRAEFIK_CERTRESOLVER:-letsencrypt}"
            TRAEFIK_ACME_EMAIL_VALUE="${TRAEFIK_ACME_EMAIL:?TRAEFIK_ACME_EMAIL secret is required}"
            COOKIE_SECURE_VALUE="${COOKIE_SECURE:-true}"
            cat > .env <<EOF
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            APP_DOMAIN=${APP_DOMAIN}
            FRONTEND_PORT=${FRONTEND_PORT_VALUE}
            TRAEFIK_ENTRYPOINTS=${TRAEFIK_ENTRYPOINTS_VALUE}
            TRAEFIK_CERTRESOLVER=${TRAEFIK_CERTRESOLVER_VALUE}
            COOKIE_SECURE=${COOKIE_SECURE_VALUE}
            EOF

            mkdir -p /root/capstone/infra/traefik/data/letsencrypt
            mkdir -p /root/capstone/infra/traefik/dynamic
            touch /root/capstone/infra/traefik/data/letsencrypt/acme.json
            chmod 600 /root/capstone/infra/traefik/data/letsencrypt/acme.json
            cat > /root/capstone/infra/traefik/dynamic/capstone.yml <<EOF
            http:
              routers:
                capstone:
                  rule: Host(\`${APP_DOMAIN}\`)
                  entryPoints:
                    - ${TRAEFIK_ENTRYPOINTS_VALUE}
                  service: capstone
                  tls:
                    certResolver: ${TRAEFIK_CERTRESOLVER_VALUE}
              services:
                capstone:
                  loadBalancer:
                    servers:
                      - url: http://host.docker.internal:${FRONTEND_PORT_VALUE}
            EOF

            TRAEFIK_CERTRESOLVER="${TRAEFIK_CERTRESOLVER_VALUE}" \
            TRAEFIK_ACME_EMAIL="${TRAEFIK_ACME_EMAIL_VALUE}" \
            docker compose -p traefik -f infra/traefik/docker-compose.yml up -d

            docker compose up -d postgres

            until docker compose ps postgres | grep -q "healthy"; do
              sleep 2
            done

            docker compose up -d --build --remove-orphans
            docker image prune -f

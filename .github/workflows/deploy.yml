name: Deploy no VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REPOSITORY: ${{ github.repository }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
      COOKIE_SECURE: ${{ secrets.COOKIE_SECURE }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 20m
          script_stop: true
          envs: REPOSITORY,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,JWT_SECRET,BACKEND_PORT,COOKIE_SECURE
          script: |
            set -eu

            export DEBIAN_FRONTEND=noninteractive

            if ! command -v git >/dev/null 2>&1; then
              apt-get update
              apt-get install -y git curl ca-certificates gnupg
            fi

            if ! command -v docker >/dev/null 2>&1; then
              apt-get update
              apt-get install -y ca-certificates curl gnupg lsb-release
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              . /etc/os-release
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu ${VERSION_CODENAME} stable" \
                > /etc/apt/sources.list.d/docker.list
              apt-get update
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              systemctl enable --now docker
            fi

            if [ ! -d /root/capstone/.git ]; then
              rm -rf /root/capstone
              git clone https://github.com/${REPOSITORY}.git /root/capstone
            fi

            cd /root/capstone
            git fetch origin main
            git checkout main
            git pull origin main

            BACKEND_PORT_VALUE="${BACKEND_PORT:-3000}"
            COOKIE_SECURE_VALUE="${COOKIE_SECURE:-true}"
            cat > .env <<EOF
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            BACKEND_PORT=${BACKEND_PORT_VALUE}
            COOKIE_SECURE=${COOKIE_SECURE_VALUE}
            EOF

            docker compose up -d postgres

            until docker compose ps postgres | grep -q "healthy"; do
              sleep 2
            done

            docker compose up -d --build --remove-orphans
            docker image prune -f
